# Test config: in-memory H2 (create-drop, fresh per run), mock vendor seam.
# Keeps @SpringBootTest fast and isolated — never touches the dev file DB.
spring:
  datasource:
    url: jdbc:h2:mem:platform-test;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password: ""
  jpa:
    hibernate:
      ddl-auto: create-drop
    open-in-view: false

platform:
  public-base-url: http://localhost:8070
  vendor: mock

logging:
  level:
    com.acme.platform: INFO

---
# soap-vendor — selects the real-vendor SOAP seam stub (SoapVendorClient).
# Used by VendorProfileTest to prove the seam swaps by config alone and that the
# stub fails fast until the vendor WSDL is supplied.
spring:
  config:
    activate:
      on-profile: soap-vendor
platform:
  vendor: soap
